
version: 2

models:
  - name: stg_customers
    description: "A customers dbt model"
    columns:
      - name: CUSTOMER_ID
        description: "The primary key for this table"
        data_tests: 
          - not_null

  - name: stg_orders
    description: "A orders dbt model"
    columns:
      - name: ORDER_ID
        description: "The primary key for this table"
        data_tests:
          - unique
          - not_null  
          
  - name: stg_products
    description: "A products dbt model"
    columns:
      - name: PRODUCT_ID
        description: "The primary key for this table"
        data_tests: 
          - not_null
